services:

  # Base de données vectorielle (UI incluse nativement)
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: griot_qdrant
    ports:
      - "6333:6333"   # API REST
      - "6334:6334"   # API gRPC
      - "6335:6335"   # Dashboard web (intégré)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: